<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ほーろっくよーがっく2026（目指せ最高のライブ）</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e94560">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ほーろっく2026">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<div id="app">
  <header>
    <h1>🎸 ほーろっくよーがっく2026</h1>
    <span id="phase-tag" class="phase-tag" style="display:none"></span>
  </header>
  <div class="bgm-panel">
    <button id="bgm-mute-btn" class="bgm-mute-btn" onclick="bgmToggleMute()" title="BGMのオン/オフ">🔊</button>
    <input id="bgm-volume" class="bgm-volume" type="range" min="0" max="100" value="30"
           oninput="bgmSetVolume(this.value)" title="音量">
  </div>
  <main id="main-content"></main>
  <div id="actions-toolbar" class="actions-toolbar" style="display:none"></div>
</div>

<div id="toast" class="toast"></div>
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div id="modal" class="modal"></div>
</div>

<script src="/app.js"></script>
</body>
</html>
